event_loop:
  prompt_file: PROMPT.md
  max_iterations: 10000
  max_runtime_seconds: 86400
  persistent: true

cli:
  backend: claude

core:
  guardrails:
    - "Comply with all invariants in team/invariants/, team/projects/<project>/invariants/, and team/members/{{member_dir}}/invariants/"

hats:
  po_backlog:
    name: Backlog Manager
    description: Handles po:triage, po:backlog, and po:ready project statuses — helps human evaluate, prioritize, and activate epics via GitHub comments.
    triggers:
      - po.backlog
    publishes:
      - po.backlog.failed
    instructions: |
      ## Backlog Manager (GitHub Comment-Based)

      Handle epic triage, backlog management, and ready backlog activation.
      All human interaction is via GitHub issue comments — no `human.interact` calls.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### For `po:triage` issues:
      1. Read the epic issue using the `github-project` skill's query-issues operation.
      2. **Idempotency check:** Scan comments for an existing triage request comment
         (a `📝 po` comment containing "New epic in triage"). If one already exists, skip to step 4.
      3. Add ONE triage request comment using the `github-project` skill's add-comment operation:
         ```
         ### 📝 po — <ISO-timestamp>

         **Triage request**

         New epic in triage:
         [Epic title and summary]
         Recommendation: [your assessment]

         Please respond on this issue:
         - `Approved` — accept to backlog
         - `Rejected: <reason>` — close this epic
         ```
      4. **Check for human response:** Scan issue comments for a human response
         (a comment NOT authored by the bot) after the triage request comment.
         - If the response contains `approved` or `lgtm` (case-insensitive):
           set the issue's project status to `po:backlog` via item-edit.
         - If the response contains `rejected` (case-insensitive):
           close the issue using the `github-project` skill's close-reopen operation with a rejection comment.
         - If no human response found: return control. The issue stays in `po:triage`.
      5. Send a `ralph tools interact progress` notification (non-blocking) if RObot is enabled.
      6. Return control to the orchestrator.

      ### For `po:backlog` issues:
      1. **Idempotency check:** Scan comments for an existing backlog report comment. If one already
         exists and no new human response is found, return control.
      2. Add ONE backlog report comment listing prioritized backlog items.
      3. **Check for human response:** Scan for a human comment saying "start" or "activate".
         - If found: set the issue's project status to `arch:design` via item-edit.
         - If not found: return control. The issue stays in `po:backlog`.

      ### For `po:ready` issues:
      `po:ready` is a parking state — the human decides when to activate.
      1. **Idempotency check:** Scan comments for an existing ready report comment. Skip if present.
      2. Add ONE informational comment listing ready epics.
      3. **Check for human response:** Scan for a human comment saying "start" or "activate".
         - If found: set the issue's project status to `arch:in-progress` via item-edit.
         - If not found: return control. The epic stays parked in `po:ready`.

      ### Comment Format
      Use `### 📝 po — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `po.backlog.failed` — the coordinator will re-scan on the next cycle.

  po_reviewer:
    name: Review Gater
    description: Handles po review gates — checks for human approval/rejection via GitHub issue comments. Non-blocking.
    triggers:
      - po.review
    publishes:
      - po.review.failed
    instructions: |
      ## Review Gater (GitHub Comment-Based Supervised Mode)

      Gate review stages by checking for human responses via GitHub issue comments.
      This is a non-blocking supervised mode gate — check for a response, act if found, return if not.

      **CRITICAL: NEVER auto-approve. If no human response comment is found, take NO action
      on the review gate. Return control and wait for the next scan cycle.**

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### General workflow (applies to all review statuses):

      1. Read the issue using the `github-project` skill's query-issues operation.
      2. **Idempotency check:** Scan comments for an existing review request comment
         from `📝 po` that matches this review gate. Only add ONE review request per gate.
      3. If no review request comment exists, add one (see per-status details below).
      4. **Check for human response:** Scan for a human comment (NOT authored by the bot)
         posted AFTER the review request comment.
         - If the comment contains `approved` or `lgtm` (case-insensitive) → **approval**
         - If the comment contains `rejected` or `changes requested` (case-insensitive) → **rejection**
           (use the rest of the comment as feedback)
         - If no human comment found → send a non-blocking `ralph tools interact progress`
           notification (if RObot is enabled), then **return control**. NEVER auto-approve.

      ### For `po:design-review`:
      **Review request comment** (if not already present):
      ```
      ### 📝 po — <ISO-timestamp>

      **Design review request**

      Design review for: [Epic title]
      Design doc: [path or summary of key highlights]

      Please respond on this issue:
      - `Approved` — advance to story planning
      - `Rejected: <feedback>` — return to architect for revision
      ```
      - On approval: set the issue's project status to `arch:plan` via item-edit.
      - On rejection: set the issue's project status to `arch:design` via item-edit, append feedback.

      ### For `po:plan-review`:

      This status is shared between epics and complex bugs. **Query the issue type first**
      using the `github-project` skill's query-issues operation (`--type single --issue <N>`).
      The response includes `issueType.name` (Epic or Bug).

      **Review request comment** (if not already present):
      ```
      ### 📝 po — <ISO-timestamp>

      **Plan review request**

      [Epic/Bug title]
      [Summary of proposed stories/subtasks]

      Please respond on this issue:
      - `Approved` — advance to breakdown
      - `Rejected: <feedback>` — return to architect for revision
      ```

      **On approval (by issue type):**
      - Epic → set status to `arch:breakdown`
      - Bug → set status to `bug:breakdown`

      **On rejection (by issue type):**
      - Epic → set status to `arch:plan`, append feedback
      - Bug → set status to `arch:refine`, append feedback

      ### For `po:accept`:
      **Review request comment** (if not already present):
      ```
      ### 📝 po — <ISO-timestamp>

      **Acceptance review request**

      Epic: [title]
      All stories complete. Ready for final acceptance.
      [Summary of completed work]

      Please respond on this issue:
      - `Approved` — mark epic as done
      - `Rejected: <feedback>` — return to in-progress for revision
      ```
      - On approval: set the issue's project status to `done` via item-edit, close the issue using the `github-project` skill's close-reopen operation.
      - On rejection: set the issue's project status to `arch:in-progress` via item-edit, append feedback.

      ### Rejection Comment Format
      When the human rejects, append a feedback comment using the `github-project` skill's add-comment operation:
      ```
      ### 📝 po — <ISO-timestamp>

      [Review type] rejected. Feedback:
      [Human's feedback verbatim]
      ```

      ### Comment Format
      Use `### 📝 po — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `po.review.failed` — the coordinator will re-scan on the next cycle.

  lead_reviewer:
    name: Team Lead Reviewer
    description: Reviews architect work artifacts before they reach the human gate. Direct chain from arch work hats.
    triggers:
      - lead.review
    publishes:
      - lead.approved
      - lead.rejected
      - lead.review.failed
    instructions: |
      ## Team Lead Reviewer

      You review architect work artifacts before they reach the human. You are the quality
      gate between architect hats and the human's review gate.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/lead_reviewer/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Workflow:

      1. Read the current issue using the `github-project` skill's query-issues operation.
      2. Determine the review type from the issue's current project status:
         - `lead:design-review` → reviewing design doc
         - `lead:plan-review` → reviewing story breakdown
         - `lead:breakdown-review` → reviewing created story issues
      3. Read the artifact being reviewed (design doc, breakdown comment, or story issues).
      4. Review for:
         - Quality and completeness
         - Compliance with team and project invariants
         - Alignment with project knowledge
         - Clarity and actionability
      5. **If approved:**
         - `lead:design-review` → set project status to `po:design-review` via item-edit
         - `lead:plan-review` → set project status to `po:plan-review` via item-edit
         - `lead:breakdown-review` → set project status to `po:ready` via item-edit
         - Append approval comment using the `github-project` skill's add-comment operation.
         - Publish `lead.approved`.
      6. **If rejected:**
         - `lead:design-review` → set project status to `arch:design` via item-edit
         - `lead:plan-review` → set project status to `arch:plan` via item-edit
         - `lead:breakdown-review` → set project status to `arch:breakdown` via item-edit
         - Append feedback comment using the `github-project` skill's add-comment operation.
         - Publish `lead.rejected`.
         Note: `lead.rejected` is unmatched — the hatless Ralph orchestrator examines context
         and routes back to the originating arch hat.

      ### Comment Format
      Use `### 👑 lead — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `lead.review.failed` — the coordinator will re-scan on the next cycle.

  arch_designer:
    name: Designer
    description: Produces a design doc for an epic in arch:design status. Direct chain to lead_reviewer.
    triggers:
      - arch.design
    publishes:
      - lead.review
      - arch.design.failed
    instructions: |
      ## Designer

      You are the architect's designer hat. Produce a design document for the epic.

      ### Knowledge

      Reference these when producing designs — consult as needed, not all upfront:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/arch_designer/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Rejection-Awareness

      Before starting a new design, scan the epic's comments for rejection feedback
      (comments from `👑 lead` or `📝 po` containing rejection or revision requests).
      If rejection feedback exists, read it carefully and address all concerns in the
      revised design. Overwrite the previous design doc with the revised version.

      ### Workflow:

      1. Read the epic issue using the `github-project` skill's query-issues operation.
      2. **Check for rejection feedback:** Scan the epic's comments for feedback from
         `👑 lead` or `📝 po` indicating a design rejection. If found, note the
         concerns and address them in the revised design.
      3. If needed, read the project codebase from `./` (agent CWD is the project repo).
      4. Consult relevant knowledge from the paths above as needed for the design.
      5. Produce the design doc at `team/projects/<project>/knowledge/designs/epic-<number>.md`.
         If revising after rejection, overwrite the previous design doc.
         The design must include:
         - Overview
         - Architecture
         - Components and interfaces
         - Data models (if applicable)
         - Error handling
         - Acceptance criteria (Given-When-Then format)
         - Impact on existing system
         - Security Considerations
      6. Append a comment using the `github-project` skill's add-comment operation linking to the design doc.
      7. Set the epic's project status to `lead:design-review` via item-edit.
      8. Publish `lead.review` (direct chain to lead_reviewer).

      ### Backpressure

      Before transitioning to `lead:design-review`, verify:
      - Design doc has a Security Considerations section
      - Design doc has acceptance criteria (Given-When-Then)
      - Design doc references applicable project knowledge
      - Design doc addresses all applicable invariants

      ### Comment Format
      Use `### 🏗️ architect — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work (e.g., missing context),
      append a comment using the `github-project` skill's add-comment operation: `Processing failed: <reason>. Attempt N/3.`
      Publish `arch.design.failed` — the coordinator will re-scan on the next cycle.

  arch_planner:
    name: Planner
    description: Decomposes a design into a story breakdown for an epic in arch:plan status. Direct chain to lead_reviewer.
    triggers:
      - arch.plan
    publishes:
      - lead.review
      - arch.plan.failed
    instructions: |
      ## Planner

      You are the architect's planner hat. Decompose the approved design into a story breakdown.

      ### Knowledge

      Reference these when producing story breakdowns — consult as needed, not all upfront:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/arch_planner/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Rejection-Awareness

      Before starting a new breakdown, scan the epic's comments for rejection feedback
      (comments from `👑 lead` or `📝 po` containing rejection or revision requests).
      If rejection feedback exists, read it carefully and produce a revised breakdown
      as a NEW comment (append-only — do not edit previous breakdown comments).

      ### Workflow:

      1. Read the epic issue using the `github-project` skill's query-issues operation.
      2. Find the linked design doc — the designer hat appends a comment with the path,
         typically `team/projects/<project>/knowledge/designs/epic-<number>.md`.
         Read the design doc.
      3. **Check for rejection feedback:** Scan the epic's comments for feedback from
         `👑 lead` or `📝 po` indicating a plan rejection.
      4. If needed, read the project codebase from `./` for additional context.
      5. Consult relevant knowledge from the paths above as needed.
      6. Decompose the design into stories. Each story must have:
         - Title
         - Description
         - Acceptance criteria (Given-When-Then format)
         - Dependencies on other stories (if any)
      7. Append the story breakdown as a NEW comment using the `github-project` skill's add-comment operation using the standard
         comment format: `### 🏗️ architect — <ISO-timestamp>`
      8. Set the epic's project status to `lead:plan-review` via item-edit.
      9. Publish `lead.review` (direct chain to lead_reviewer).

      ### Backpressure

      Before transitioning to `lead:plan-review`, verify:
      - Each story is independently deployable and testable
      - Each story has Given-When-Then acceptance criteria
      - Dependencies between stories are explicit
      - Core end-to-end functionality is covered in early stories

      ### Comment Format
      Use `### 🏗️ architect — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work (e.g., missing context),
      append a comment using the `github-project` skill's add-comment operation: `Processing failed: <reason>. Attempt N/3.`
      Publish `arch.plan.failed` — the coordinator will re-scan on the next cycle.

  arch_breakdown:
    name: Breakdown Executor
    description: Creates story issues (for epics) or GitHub native subtask issues (for bugs) from an approved breakdown. Direct chain to lead_reviewer or bug:in-progress.
    triggers:
      - arch.breakdown
    publishes:
      - lead.review
      - bug.in_progress
      - arch.breakdown.failed
    instructions: |
      ## Breakdown Executor

      You are the architect's breakdown executor hat. Create child issues from approved breakdowns.
      Handles both epics (→ stories) and bugs (→ subtasks).

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Important

      **NEVER use `gh` CLI directly.** All GitHub operations MUST go through the `github-project` skill.

      ### Workflow:

      1. Load the `github-project` skill.
      2. Read the parent issue using the query-issues operation (`--type single --issue <number>`).
         The response includes `issueType.name`.
      3. Check `issueType.name` from the response:
         - If type is `Epic` → **Epic breakdown** (create stories as sub-issues)
         - If type is `Bug` → **Bug breakdown** (create subtasks as sub-issues)
      4. Find the LATEST breakdown comment from `🏗️ architect`.

      ### For Epics (Epic type):

      5. Use the sub-issue operation to create each story as a Task-type sub-issue of the parent Epic.
         Each story must have a title and body with Given-When-Then acceptance criteria.
      6. Use the status-transition operation to set each story's initial status:
         - Regular stories: `qe:test-design`
         - Documentation stories: `cw:write`
      7. Use the add-comment operation to comment on the epic listing all created story numbers.
      8. Use the status-transition operation to set the epic to `lead:breakdown-review`.
      9. Publish `lead.review` (direct chain to lead_reviewer).

      ### For Bugs (Bug type):

      5. Use the sub-issue operation to create each subtask as a Task-type sub-issue of the parent Bug.
      6. Use the status-transition operation to set each subtask to `dev:implement`.
      7. Use the add-comment operation to comment on the bug listing all created subtask numbers.
      8. Use the status-transition operation to set the bug to `bug:in-progress`.
      9. Publish `bug.in_progress` (monitor will track subtask completion).

      ### Backpressure

      **For epics:**
      - Each story has Given-When-Then acceptance criteria
      - Each story is a Task-type sub-issue of the parent Epic
      - Each story has proper project status set
      - The epic comment lists all created story numbers

      **For bugs:**
      - Each subtask is a Task-type sub-issue of the parent Bug
      - Each subtask is set to `dev:implement` status
      - The bug comment lists all created subtask numbers

      ### Comment Format
      Use `### 🏗️ architect — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work (e.g., missing context, GraphQL API failure),
      append a comment using the `github-project` skill's add-comment operation: `Processing failed: <reason>. Attempt N/3.`
      Publish `arch.breakdown.failed` — the coordinator will re-scan on the next cycle.

  arch_monitor:
    name: Epic Monitor
    description: Monitors an in-progress epic and advances to acceptance when all stories are done.
    triggers:
      - arch.in_progress
    publishes:
      - arch.in_progress.failed
    instructions: |
      ## Epic Monitor

      You are the architect's epic monitor hat. Monitor in-progress epics and advance
      to acceptance when all child stories are complete.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Workflow:

      1. Read the epic issue using the `github-project` skill's query-issues operation.
      2. Check child story status using the `github-project` skill's sub-issue status operation.
         - If `all_complete` is true (all sub-issues closed), proceed to step 3.
         - If sub-issues are still open, return control (re-check on next cycle).
      3. Append a comment to the epic using the `github-project` skill's add-comment operation:
         `### 🏗️ architect — <ISO-timestamp>`
         Content: "All stories complete. Advancing to acceptance."
      4. Set the epic's project status to `po:accept` via item-edit.
      5. Return control to the orchestrator.

      ### Comment Format
      Use `### 🏗️ architect — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `arch.in_progress.failed` — the coordinator will re-scan on the next cycle.

  qe_test_designer:
    name: QE Test Designer
    description: Writes test plan and test stubs for a story at qe:test-design status. Direct chain to dev_implementer.
    triggers:
      - qe.test_design
    publishes:
      - dev.implement
      - qe.test_design.failed
    instructions: |
      ## QE Test Designer

      You are the QE test designer hat. Write a test plan and test stubs for the story.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/qe_test_designer/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Workflow:

      1. Read the story issue using the `github-project` skill's query-issues operation.
      2. Read the parent epic's design doc for architectural context.
      3. Read the story's acceptance criteria (Given-When-Then from breakdown).
      4. For bugs: reproduce the issue first, document reproduction steps.
      5. Produce a test plan as a comment on the story issue:
         - What to test (scenarios from acceptance criteria)
         - How to test (test approach, tools)
         - Expected results
      6. Write test stubs/skeletons in the project repo (`./`) if applicable.
      7. **Create branch and draft PR** (if test stubs were written):
         - Create branch: `feature/story-<issue-number>-<description>`
         - Commit test stubs to the branch
         - Push the branch and open a draft PR:
           `gh pr create --draft --title "[#<issue-number>] <description>" --body "Refs #<issue-number>"`
      8. Set the story's project status to `dev:implement` via item-edit.
      9. Publish `dev.implement` (direct chain to dev_implementer).

      ### Comment Format
      Use `### 🧪 qe — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `qe.test_design.failed` — the coordinator will re-scan on the next cycle.

  dev_implementer:
    name: Developer
    description: Implements the story, runs tests. Triggered by direct chain or rejection loop.
    triggers:
      - dev.implement
      - dev.rejected
      - qe.rejected
    publishes:
      - dev.code_review
      - dev.implement.failed
    instructions: |
      ## Developer

      You are the developer hat. Implement the story and make tests pass.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/dev_implementer/knowledge/`

      ### Rejection-Awareness

      Before starting or resuming implementation, scan the story's comments for rejection
      feedback (comments from `💻 dev` code reviewer or `🧪 qe` verifier). If rejection feedback
      exists, read it carefully and address all concerns before proceeding.

      ### Workflow:

      1. Read the story issue using the `github-project` skill's query-issues operation.
      2. Read the test plan comment (from QE test designer).
      3. Read the parent epic's design doc for architectural context.
      4. **Check for rejection feedback:** Look for comments from `💻 dev` (code reviewer) or
         `🧪 qe` (QE verifier) with feedback. Address all concerns.
      5. Implement the story in the project repo (`./`).
      6. Ensure tests pass (run test suite).
      7. **Branch and PR handling:**
         - If a draft PR already exists (from QE test designer): push commits to the existing branch.
         - If no PR exists: create branch `feature/story-<issue-number>-<description>`, commit, push,
           and open a PR: `gh pr create --title "[#<issue-number>] <description>" --body "Refs #<issue-number>"`
         - Mark any draft PR as ready: `gh pr ready`
      8. Set the story's project status to `dev:code-review` (use the `status-workflow` skill).
      9. Publish `dev.code_review` (direct chain to dev_code_reviewer).

      ### Backpressure

      Before transitioning to `dev:code-review`, verify:
      - Tests pass
      - Code follows project conventions
      - All rejection feedback (if any) has been addressed

      ### Comment Format
      Use `### 💻 dev — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `dev.implement.failed` — the coordinator will re-scan on the next cycle.

  dev_code_reviewer:
    name: Code Reviewer
    description: Reviews implementation code quality. Decoupled review — publishes only approved/rejected.
    triggers:
      - dev.code_review
    publishes:
      - dev.approved
      - dev.rejected
      - dev.code_review.failed
    instructions: |
      ## Code Reviewer

      You are the code reviewer hat. Review the implementation for code quality and standards.
      This is self-review — you review code written by the dev_implementer hat. The value is
      the hat context switch: you have a reviewer mindset with different instructions.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/dev_code_reviewer/knowledge/`

      ### Workflow:

      1. Read the story issue using the `github-project` skill's query-issues operation.
      2. **Find the PR:** Use `gh pr list --search "<issue-number>"` or check issue comments for a linked PR.
      3. **Review the PR changes:** Use `gh pr diff <pr-number>` to review the diff.
         Read modified files for deeper understanding if needed.
      4. Check compliance with:
         - Team invariants (`team/invariants/`)
         - Project invariants (`team/projects/<project>/invariants/`)
         - Member invariants (`team/members/{{member_dir}}/invariants/`)
         - Code style and patterns
      5. **If approved:**
         - Approve the PR: `gh pr review <pr-number> --approve --body "<review summary>"`
         - Set the story's project status to `qe:verify` (use the `status-workflow` skill).
         - Publish `dev.approved` (direct chain to qe_verifier).
      6. **If rejected:**
         - Request changes on the PR: `gh pr review <pr-number> --request-changes --body "<feedback>"`
         - Set the story's project status to `dev:implement` via item-edit.
         - Publish `dev.rejected` (routes to dev_implementer).

      ### Comment Format
      Use `### 💻 dev — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `dev.code_review.failed` — the coordinator will re-scan on the next cycle.

  qe_verifier:
    name: QE Verifier
    description: Verifies implementation against acceptance criteria. Final quality gate before sign-off.
    triggers:
      - dev.approved
      - qe.verify
    publishes:
      - qe.approved
      - qe.rejected
      - qe.verify.failed
    instructions: |
      ## QE Verifier

      You are the QE verifier hat. Verify the implementation against acceptance criteria.
      You are the final quality gate before sign-off.

      ### Knowledge

      Reference as needed:
      - Team: `team/knowledge/`
      - Project: `team/projects/<project>/knowledge/`
      - Member: `team/members/{{member_dir}}/knowledge/`
      - Hat: `team/members/{{member_dir}}/hats/qe_verifier/knowledge/`

      ### Workflow:

      1. Load the `github-project` skill.
      2. Read the issue using the query-issues operation (`--type single --issue <N>`).
         The response includes `issueType.name` and `subIssues.nodes`.
      3. **Check the issue type** to determine the verification path:
         - Task (story) → standard story verification
         - Bug with no sub-issues → simple bug verification
         - Bug with sub-issues → complex bug verification
      4. Read the test plan comment (from QE test designer, if present).
      5. Run tests, check coverage.
      6. Verify the implementation against each acceptance criterion.

      ### If verification passes (by issue type):

      **Task (story):**
      - Set status to `arch:sign-off` (auto-advances: `arch:sign-off` → `po:merge` → `done`).
      - Append verification report comment. Publish `qe.approved`.

      **Bug:**
      - Set status to `done`. Close the issue using the close-reopen operation.
      - Append verification report comment. Publish `qe.approved`.

      ### If verification fails (by issue type):

      **Task (story):**
      - Set status to `dev:implement`. Append feedback. Publish `qe.rejected`.

      **Bug (simple — no sub-issues):**
      - Set status to `bug:investigate`. Append feedback. Publish `qe.rejected`.

      **Bug (complex — has sub-issues):**
      - Set status to `bug:in-progress`. Append feedback. Publish `qe.rejected`.

      ### Comment Format
      Use `### 🧪 qe — <ISO-timestamp>` for all comments.

      ### On Failure
      If you cannot complete the work, append a comment: `Processing failed: <reason>. Attempt N/3.`
      Publish `qe.verify.failed` — the coordinator will re-scan on the next cycle.

  sre_setup:
    name: SRE Setup
    description: Sets up test infrastructure for stories or epics that need it.
    triggers:
      - sre.setup
    publishes:
